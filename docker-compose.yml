networks:
  tenderzone_net:
    driver: bridge

services:
  db:
    image: postgres:15-alpine
    container_name: tenderzone_db
    networks: [tenderzone_net]
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 20s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: tenderzone_redis
    networks: [tenderzone_net]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 10s
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tenderzone_backend
    networks: [tenderzone_net]
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SYNC_DATABASE_URL: ${SYNC_DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      PUBLIC_URL_BASE: ${PUBLIC_URL_BASE}
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "
        echo '=== Running Alembic migrations ===' &&
        alembic upgrade head &&
        echo '=== Starting FastAPI ===' &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000
      "
    restart: on-failure

  celery_worker:
    build:
      context: ./backend
    container_name: tenderzone_worker
    networks: [tenderzone_net]
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SYNC_DATABASE_URL: ${SYNC_DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      PUBLIC_URL_BASE: ${PUBLIC_URL_BASE}
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.tasks.celery_app.celery_app worker --loglevel=info --concurrency=2 -E
    restart: unless-stopped

  celery_beat:
    build:
      context: ./backend
    container_name: tenderzone_beat
    networks: [tenderzone_net]
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SYNC_DATABASE_URL: ${SYNC_DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      PUBLIC_URL_BASE: ${PUBLIC_URL_BASE}
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.tasks.celery_app.celery_app beat --loglevel=info
    restart: unless-stopped

  flower:
    build:
      context: ./backend
    container_name: tenderzone_flower
    networks: [tenderzone_net]
    ports:
      - "5555:5555"
    env_file:
      - ./backend/.env
    environment:
      REDIS_URL: ${REDIS_URL}
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A app.tasks.celery_app.celery_app flower --port=5555 --broker=${REDIS_URL}
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: tenderzone_frontend
    networks: [tenderzone_net]
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: "https://tenderzonemarketing.uz"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/.env.local:/app/.env.local
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  uploads_data: