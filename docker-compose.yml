version: "3.9"

networks:
  tenderzone_net:
    driver: bridge

volumes:
  postgres_data:
  uploads_data:

services:
  db:
    image: postgres:15-alpine
    container_name: tenderzone_db
    networks: [tenderzone_net]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-1}
      POSTGRES_DB: ${POSTGRES_DB:-tenderzone_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-tenderzone_db}"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: tenderzone_redis
    networks: [tenderzone_net]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 10s
    restart: unless-stopped

  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tenderzone_migrate
    networks: [tenderzone_net]
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/alembic/versions:/app/alembic/versions
    depends_on:
      db:
        condition: service_healthy
    command: alembic upgrade head
    restart: "no"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tenderzone_backend
    networks: [tenderzone_net]
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - uploads_data:/app/uploads
      - ./backend/alembic/versions:/app/alembic/versions
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped

  celery_worker:
    build:
      context: ./backend
    container_name: tenderzone_worker
    networks: [tenderzone_net]
    env_file:
      - ./backend/.env
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    command: celery -A app.tasks.celery_app.celery_app worker --loglevel=info --concurrency=2 -E
    restart: unless-stopped

  celery_beat:
    build:
      context: ./backend
    container_name: tenderzone_beat
    networks: [tenderzone_net]
    env_file:
      - ./backend/.env
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    command: celery -A app.tasks.celery_app.celery_app beat --loglevel=info
    restart: unless-stopped

  flower:
    build:
      context: ./backend
    container_name: tenderzone_flower
    networks: [tenderzone_net]
    ports:
      - "5555:5555"
    env_file:
      - ./backend/.env
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A app.tasks.celery_app.celery_app flower --port=5555
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: "https://tenderzonemarketing.uz"
    container_name: tenderzone_frontend
    networks: [tenderzone_net]
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: "https://tenderzonemarketing.uz"
    depends_on:
      - backend
    restart: unless-stopped