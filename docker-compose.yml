networks:
  tenderzone_net:
    driver: bridge

services:
  # ─── PostgreSQL ─────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: tenderzone_db
    networks: [tenderzone_net]
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "1"
      POSTGRES_DB: tenderzone_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tenderzone_db"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 20s
    restart: unless-stopped

  # ─── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: tenderzone_redis
    networks: [tenderzone_net]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 10s
    restart: unless-stopped

  # ─── Backend (FastAPI) ──────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tenderzone_backend
    networks: [tenderzone_net]
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: "postgresql+asyncpg://postgres:1@db:5432/tenderzone_db"
      SYNC_DATABASE_URL: "postgresql://postgres:1@db:5432/tenderzone_db"
      REDIS_URL: "redis://redis:6379/0"
      PUBLIC_URL_BASE: "https://novelettish-madilyn-fungitoxic.ngrok-free.dev"
#    environment:
#      # docker-compose bu qiymatlar .env ni OVERRIDE qiladi
#      DATABASE_URL: "postgresql+asyncpg://postgres:1@db:5432/tenderzone_db"
#      SYNC_DATABASE_URL: "postgresql://postgres:1@db:5432/tenderzone_db"
#      REDIS_URL: "redis://redis:6379/0"
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "
        echo '=== Running Alembic migrations ===' &&
        alembic upgrade head &&
        echo '=== Starting FastAPI ===' &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "
    restart: on-failure

  # ─── Celery Worker ──────────────────────────────────────────────────────────
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tenderzone_worker
    networks: [tenderzone_net]
    env_file:
      - ./backend/.env

    environment:
      DATABASE_URL: "postgresql+asyncpg://postgres:1@db:5432/tenderzone_db"
      SYNC_DATABASE_URL: "postgresql://postgres:1@db:5432/tenderzone_db"
      REDIS_URL: "redis://redis:6379/0"
      PUBLIC_URL_BASE: "https://novelettish-madilyn-fungitoxic.ngrok-free.dev"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.tasks.celery_app.celery_app worker --loglevel=info --concurrency=2 -E
    restart: unless-stopped

  # ─── Celery Beat ────────────────────────────────────────────────────────────
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tenderzone_beat
    networks: [tenderzone_net]
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: "postgresql+asyncpg://postgres:1@db:5432/tenderzone_db"
      SYNC_DATABASE_URL: "postgresql://postgres:1@db:5432/tenderzone_db"
      REDIS_URL: "redis://redis:6379/0"
      PUBLIC_URL_BASE: "https://novelettish-madilyn-fungitoxic.ngrok-free.dev"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.tasks.celery_app.celery_app beat --loglevel=info
    restart: unless-stopped

  # ─── Flower (Celery UI) ─────────────────────────────────────────────────────
  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tenderzone_flower
    networks: [tenderzone_net]
    ports:
      - "5555:5555"
    env_file:
      - ./backend/.env
    environment:
      REDIS_URL: "redis://redis:6379/0"
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A app.tasks.celery_app.celery_app flower --port=5555 --broker=redis://redis:6379/0
    restart: unless-stopped

  # ─── Frontend (Next.js) ─────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tenderzone_frontend
    networks: [tenderzone_net]
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:8000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/.env.local:/app/.env.local
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  uploads_data:
