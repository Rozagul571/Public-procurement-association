networks:
  tenderzone_net:
    driver: bridge

services:
  db:
    image: postgres:15-alpine
    container_name: tenderzone_db
    networks: [tenderzone_net]
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1
      POSTGRES_DB: tenderzone_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tenderzone_db"]
      interval: 5s
      timeout: 5s
      retries: 30
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: tenderzone_redis
    networks: [tenderzone_net]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 15
    restart: unless-stopped

  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tenderzone_migrate
    networks: [tenderzone_net]
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/alembic/versions:/app/alembic/versions
    depends_on:
      db:
        condition: service_healthy
    command: alembic upgrade head
    restart: "no"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tenderzone_backend
    networks: [tenderzone_net]
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - uploads_data:/app/uploads
      - ./backend/alembic/versions:/app/alembic/versions
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: "http://localhost:8000"
    container_name: tenderzone_frontend
    networks: [tenderzone_net]
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: "http://localhost:8000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  uploads_data:
